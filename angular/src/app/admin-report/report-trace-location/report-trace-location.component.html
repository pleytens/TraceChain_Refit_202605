<div class="card">
  <div class="card-header">
    <div class="row">
      <div class="col col-md-6">
        <h2 class="card-title">
          {{ '::Menu:AdminReport' | abpLocalization }}
        </h2>
      </div>
      <div class="text-end col col-md-6">
        <div class="text-lg-end pt-2"></div>
      </div>
    </div>
  </div>
  <div class="row margin-custom">
    <div class="col col-md-12">
      <div class="input-group">
        <input
          type="text"
          class="form-control"
          [(ngModel)]="filterText"
          [placeholder]="'::Search' | abpLocalization"
        />

        <button
          class="btn btn-outline-secondary bi bi-search"
          (click)="filter($event)"
          type="button"
        ></button>
      </div>
    </div>
  </div>
</div>
<div class="row">
  <div class="col col-md-5">
    <div class="card">
      <div class="card-header">
        <div class="row">
          <div class="col col-md-6"></div>
          <div class="text-end col col-md-6"></div>
        </div>
      </div>
      <ngx-datatable
        [rows]="productReportScan.items"
        [count]="productReportScan.totalCount"
        [list]="list"
        (activate)="onProductSelect($event)"
        default
      >
        <ngx-datatable-column
          [name]="'::Actions' | abpLocalization"
          [maxWidth]="150"
          [sortable]="false"
        >
          <ng-template let-row="row" ngx-datatable-cell-template>
            <div ngbDropdown container="body" class="d-inline-block">
              <button
                class="btn btn-primary btn-sm dropdown-toggle"
                data-toggle="dropdown"
                aria-haspopup="true"
                ngbDropdownToggle
              >
                <i class="fa fa-cog me-1"></i>{{ '::Actions' | abpLocalization }}
              </button>
              <div ngbDropdownMenu>
                <button
                  ngbDropdownItem
                  (click)="viewInMap(row.productId)"
                  [disabled]="row.idEditable"
                >
                  {{ '::AdminReport:ViewInMap' | abpLocalization }}
                </button>
              </div>
            </div>
          </ng-template>
        </ngx-datatable-column>
        <ngx-datatable-column
          [name]="'::AdminReport:GtinCode' | abpLocalization"
          prop="gtinCode"
          [sortable]="false"
        >
        </ngx-datatable-column>
        <ngx-datatable-column
          [name]="'::AdminReport:ProductName' | abpLocalization"
          prop="name"
          [sortable]="false"
        >
        </ngx-datatable-column>
        <ngx-datatable-column
          [name]="'::AdminReport:LatestTimeScan' | abpLocalization"
          prop="numberOfScans"
          [sortable]="false"
        >
        </ngx-datatable-column>
      </ngx-datatable>
    </div>
  </div>
  <div class="col col-md-7">
    <app-gtin-code-report [productId]="selectedProductId"></app-gtin-code-report>
  </div>
</div>
