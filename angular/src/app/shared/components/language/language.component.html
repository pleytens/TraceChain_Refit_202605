
<div ngbDropdown class="d-inline-block">
  <button
    type="button"
    class="btn border-0 p-0"
    id="dropdownField-btn"
    ngbDropdownToggle
  >
    <span>{{lang}}</span>
  </button>
  <div ngbDropdownMenu aria-labelledby="dropdownField">
    <button type="button" ngbDropdownItem *ngFor="let data of langList" (click)="changeLanguage(data)">
       {{ data.displayName }}
    </button>
  </div>
</div>
