<div class="container">
  <h3 class="text-black">
    {{ question?.questionText }}
  </h3>
  @if (question) {
    @for (answer of question?.answers; track answer.answerId) {
      <div [ngSwitch]="question.dataType">
        <ng-container *ngSwitchCase="QuestionDataTypeEnum.Text">
          <textarea
            class="form-control"
            [placeholder]="'::Minigame:Answer' | abpLocalization"
            rows="3"
            (input)="onTextChange($event)"
          ></textarea>
        </ng-container>
        <ng-container *ngSwitchCase="QuestionDataTypeEnum.Select">
          <label
            class="card bg-light d-block cursor-pointer rounded-1 p-2"
            [for]="question.questionId"
            style="cursor: pointer; margin-bottom: 1rem !important"
          >
            <div class="d-flex align-items-center">
              <input
                class="form-check-input bg-white mt-0 flex-shrink-0"
                type="radio"
                [name]="question.questionId"
                [id]="answer.answerId"
                (change)="selectAnswer(answer.answerId)"
              />
              <div class="form-check text-black mb-0 ps-2">
                <span class="form-check-label">{{ answer.answerText }}</span>
              </div>
            </div>
          </label>
        </ng-container>
        <ng-container *ngSwitchCase="QuestionDataTypeEnum.MultipleSelect">
          <label
            class="card bg-light d-block cursor-pointer rounded-1 p-2"
            [for]="answer.answerId"
            style="cursor: pointer; margin-bottom: 1rem !important"
          >
            <div class="d-flex align-items-center">
              <input
                class="form-check-input bg-white mt-0 flex-shrink-0"
                type="checkbox"
                [name]="questionId"
                [id]="answer.answerId"
                (change)="toggleCheckbox(answer.answerId, $event)"
              />
              <div class="form-check text-black mb-0 ps-2">
                <span class="form-check-label">{{ answer.answerText }}</span>
              </div>
            </div>
          </label>
        </ng-container>
      </div>
    }
  }
</div>
