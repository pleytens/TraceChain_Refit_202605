<div class="container-fluid">
  <div class="row d-flex justify-content-center">
    <div class="col col-sm-12 col-md-8 col-lg-6 px-0 bg-white">
      <div class="p-4">
        <h3 class="text-black mb-2">{{ '::Minigame' | abpLocalization }}</h3>
        @if (imgSrc) {
          <div class="my-2">
            <img [src]="imgSrc" class="img-fluid rounded" alt="Images" />
          </div>
        }
        @for (question of questionList; track question.questionId) {
          <app-minigame-question
            [question]="question"
            (answerChange)="onAnswerChange($event)"
          ></app-minigame-question>
        }
        <div class="sticky-bottom d-flex justify-content-center mt-4">
          <button class="btn btn-primary w-100" (click)="openSubmitModal()">
            {{ '::Submit' | abpLocalization }}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<ng-template #userInfoModal let-modal>
  <div class="modal-header">
    <h5 class="modal-title">{{ '::Minigame:ConfirmWithUs' | abpLocalization }}</h5>
    <button type="button" class="btn-close" (click)="modal.dismiss()"></button>
  </div>
  <div class="modal-body">
    <form #userForm="ngForm">
      <div class="mb-3">
        <label class="form-label">{{ '::Minigame:Email' | abpLocalization }}</label>
        <input
          type="email"
          class="form-control"
          [(ngModel)]="userInfo.email"
          name="email"
          required
        />
      </div>
      <div class="mb-3">
        <label class="form-label">{{ '::Minigame:Phone' | abpLocalization }}</label>
        <input
          type="text"
          class="form-control"
          [(ngModel)]="userInfo.phoneNumber"
          name="phoneNumber"
        />
      </div>
      <div class="mb-3">
        <label class="form-label">{{ '::Minigame:Name' | abpLocalization }}</label>
        <input type="text" class="form-control" [(ngModel)]="userInfo.fullName" name="fullName" />
      </div>
<!--      <div class="mb-3">-->
<!--        <label class="form-label required">{{ '::Minigame:Order' | abpLocalization }}</label>-->
<!--        <app-upload-component-->
<!--          #uploadComponent-->
<!--          id="image"-->
<!--          [maxFilesNumber]="1"-->
<!--        ></app-upload-component>-->
<!--      </div>-->
    </form>
  </div>
  <div class="modal-footer justify-content-center">
    <button class="btn btn-primary px-5" [disabled]="finishSubmission" (click)="submitAll(modal)">
      {{ '::Save' | abpLocalization }}
    </button>
  </div>
</ng-template>

<ng-template #completedModal let-modal>
  <div class="modal-header"></div>
  <div class="modal-body ">
    <p class="fw-bold fs-4">
      {{ '::Minigame:CompletedMessage' | abpLocalization }}
    </p>
  </div>
  <div class="modal-footer justify-content-center">
    <button class="btn btn-primary" (click)="dismissModal(modal)">
      {{ '::Close' | abpLocalization }}
    </button>
  </div>
</ng-template>
