<div class="overflow-auto">
  <div class="flex-nowrap d-flex align-items-center">
    <div class="me-2" *ngFor="let cert of listCert" >
      <img *ngIf="cert" [ngSrc]="cert" (click)="openImageModal(cert)" width="200" height="150" style="min-width: 200px; height: auto" alt="Certificate Image" />
    </div>
  </div>
</div>
