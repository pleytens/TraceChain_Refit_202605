<div class='card'>
  <div class='card-header'>
    <div class='row'>
      <div class='col col-md-6'>
        <h2 class='card-title'>
          {{ '::Menu:ProductCategory' | abpLocalization }}
        </h2>
      </div>
      <div class='text-end col col-md-6'>
        <div class='text-lg-end pt-2'>
          <button *abpPermission="'TraceFarm.ProductCategories.Create'" id='create' class='btn btn-primary' type='button'
                  (click)='createProductCategory()'>
            <i class='fa fa-plus me-1'></i>
            <span>{{ "::NewProductCategory" | abpLocalization }}</span>
          </button>
        </div>
      </div>
    </div>
  </div>
  <div class='row'>
    <div class='col col-md-12'>
      <div style='margin:20px'>
        <input type='text' class='form-control' [(ngModel)]='filterText' placeholder='Search'
               (keydown)='filter($event)' />
      </div>
    </div>
  </div>
  <div class="card-body">
    <ngx-datatable [rows]="productCategory.items" [count]="productCategory.totalCount" [list]="list" default>
      <ngx-datatable-column
        [name]="'::Actions' | abpLocalization"
        [maxWidth]="150"
        [sortable]="false"
      >
        <ng-template let-row="row" ngx-datatable-cell-template>
          <div ngbDropdown container="body" class="d-inline-block">
            <button
              class="btn btn-primary btn-sm dropdown-toggle"
              data-toggle="dropdown"
              aria-haspopup="true"
              ngbDropdownToggle
            >
              <i class="fa fa-cog me-1"></i>{{ '::Actions' | abpLocalization }}
            </button>
            <div ngbDropdownMenu>
              <button ngbDropdownItem (click)="editProductCategory(row.id)">
                {{ '::Edit' | abpLocalization }}
              </button>
              <button ngbDropdownItem (click)="deleteProductCategory(row.id)">
                {{ '::Delete' | abpLocalization }}
              </button>
            </div>
          </div>
        </ng-template>
      </ngx-datatable-column>
      <ngx-datatable-column [name]="'::ProductCategory:Name' | abpLocalization" prop="name"></ngx-datatable-column>
      <ngx-datatable-column [name]="'::ProductCategory:ProductCount' | abpLocalization" prop="productCount" [width]="50">
      </ngx-datatable-column>
    </ngx-datatable>
  </div>
</div>

<abp-modal [(visible)]="isModalOpen" [options]="{centered: false, size: 'x' }">
  <ng-template #abpHeader>
    <h3>{{ (selectedProductCategory.id ? '::Edit' : '::NewProductCategory' ) | abpLocalization }}</h3>
  </ng-template>

  <ng-template #abpBody>
    <form [formGroup]="form" (ngSubmit)="save()">
      <div class="mt-2">
        <label for="product-category-name">Name</label><span> * </span>
        <input type="text" id="product-category-name" class="form-control" formControlName="name" autofocus />
      </div>
    </form>
  </ng-template>

  <ng-template #abpFooter>
    <button type="button" class="btn btn-secondary" abpClose>
      {{ '::Close' | abpLocalization }}
    </button>
    <button class="btn btn-primary" (click)="save()" [disabled]="form.invalid">
      <i class="fa fa-check mr-1"></i>
      {{ '::Save' | abpLocalization }}
    </button>
  </ng-template>
</abp-modal>
