<div class="card">
  <div class="card-header">
    <div class="row">
      <div class="col col-md-6">
        <h2 class="card-title">
          {{ '::Menu:Recording' | abpLocalization }}
        </h2>
      </div>
    </div>
  </div>
  <div *ngIf="isShowFilter">
    <div class="row margin-custom">
      <div class="col col-md-12">
        <div class="input-group">
          <input
            type="text"
            class="form-control"
            [(ngModel)]="filterText"
            [placeholder]="'::Search' | abpLocalization"
            (keyup.enter)="filter($event)"
          />

          <button
            class="btn btn-outline-secondary bi bi-search"
            (click)="filter($event)"
            type="button"
          ></button>
        </div>
      </div>
    </div>
    <div class="row margin-custom">
      <div class="col col-md-6">
        <a
          type="button"
          class="link-primary ms-2"
          (click)="isCollapsed = !isCollapsed"
          [attr.aria-expanded]="!isCollapsed"
          aria-controls="collapseExample"
        >
          {{ '::AdvanceFilter' | abpLocalization }}
        </a>
      </div>
    </div>
    <div #collapse="ngbCollapse" [(ngbCollapse)]="isCollapsed">
      <div class="row margin-custom">
        <div class="row d-flex">
          <div class="col col-md-3 row d-flex">
            <ngx-bootstrap-multiselect
              [options]="processOptions"
              [(ngModel)]="filterProcess"
              [settings]="multiSelectSetting"
              [texts]="multiSelectText"
              (ngModelChange)="filterDateChange()"
              class="d-flex w-100 mw-100 flex-fill"
            ></ngx-bootstrap-multiselect>
          </div>
          <div class="col col-md-3 row d-flex">
            <ngx-bootstrap-multiselect
              [options]="userData.data"
              [(ngModel)]="createByFilter"
              [settings]="multiSelectSetting"
              [texts]="multiCreatedBySelectText"
              class="d-flex w-100 mw-100 flex-fill"
            ></ngx-bootstrap-multiselect>
          </div>
          <div class="col col-md-3">
            <div class="input-group">
              <input
                class="form-control text-muted"
                [placeholder]="'::FromDate' | abpLocalization"
                name="dp"
                [(ngModel)]="fromDate"
                (ngModelChange)="filterDateChange()"
                ngbDatepicker
                #fromDatePicker="ngbDatepicker"
              />
              <button
                class="btn btn-outline-secondary bi bi-calendar3"
                (click)="fromDatePicker.toggle()"
                type="button"
              ></button>
            </div>
          </div>
          <div class="col col-md-3">
            <div class="input-group">
              <input
                class="form-control text-muted"
                [placeholder]="'::ToDate' | abpLocalization"
                name="dp"
                [(ngModel)]="toDate"
                (ngModelChange)="filterDateChange()"
                ngbDatepicker
                #toDatePicker="ngbDatepicker"
              />
              <button
                class="btn btn-outline-secondary bi bi-calendar3"
                (click)="toDatePicker.toggle()"
                type="button"
              ></button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="card-body">
    <ng-container>
      <div class="card-content">
        <ngx-datatable
          [rows]="process.items"
          [count]="process.totalCount"
          [list]="list"
          default
          [selectAllRowsOnPage]="true"
          (activate)="rowClick($event)"
          [externalPaging]="!isShowHome"
        >
          <ngx-datatable-column
            [name]="'::Actions' | abpLocalization"
            [maxWidth]="150"
            [sortable]="false"
          >
            <ng-template let-row="row" ngx-datatable-cell-template>
              <div ngbDropdown container="body" class="d-inline-block">
                <button class="btn btn-primary btn-sm" aria-haspopup="true">
                  {{ '::Record' | abpLocalization }}
                </button>
              </div>
            </ng-template>
          </ngx-datatable-column>
          <ngx-datatable-column
            [name]="'::Record:ProcessName' | abpLocalization"
            prop="name"
            [sortable]="false"
          ></ngx-datatable-column>
          <ngx-datatable-column
            [name]="'::Record:StepCount' | abpLocalization"
            prop="stepCount"
            [sortable]="false"
          ></ngx-datatable-column>
          <ngx-datatable-column
            [name]="'::Record:CreatedBy' | abpLocalization"
            prop="createdBy"
            [sortable]="false"
          ></ngx-datatable-column>
        </ngx-datatable>
      </div>
    </ng-container>
  </div>
</div>
