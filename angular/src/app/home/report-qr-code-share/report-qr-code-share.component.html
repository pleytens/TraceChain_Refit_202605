<div class="row">
  <div class="col-md-11">
    <label> {{ '::Home:ChartLeftTitle' | abpLocalization }}</label>
  </div>
<!--  <div class="col-md-1" >-->
<!--    <a (click)="refresh()">-->
<!--      <i class="fas fa-undo-alt" style="text-align: end; float: right"></i>-->
<!--    </a>-->
<!--  </div>-->
</div>
<div class="row">
  <div class="col-md-12">
    <div class="form-group">
      <label for="partnerTypehead"></label>
      <app-typehead-focus
        id="partnerTypehead"
        [id]="'partnerTypehead'"
        [dataInput]="partnerData"
        (dataReturn)="eventPartnerSelectHandle($event)"
        [initialSelected]="partnerData.selected"
        [placeholder]="'::Record:PartnerName' | abpLocalization"
      ></app-typehead-focus>
    </div>
  </div>
</div>
<div class="row" style="padding-bottom: 15px">
  <div class="col-md-6">
    <div class="form-group">
      <label for="from"></label>
      <input
        type="date"
        class="form-control"
        id="from"
        [(ngModel)]="from"
        (change)="onChangeDate($event)"
      />
    </div>
  </div>
  <div class="col-md-6">
    <div class="form-group">
      <label for="to"></label>
      <input
        type="date"
        class="form-control"
        id="to"
        [(ngModel)]="to"
        (change)="onChangeDate($event)"
      />
    </div>
  </div>
</div>
<abp-chart
  type="bar"
  [data]="data"
  [options]="options"
  width="100%"
  height="400px"
></abp-chart>
