<div class="card-question card border border-2 mt-3">
  <div class="card-body">
    <div class="row">
      <div class="col-8">
        <div class="row mb-2">
          <div class="col">
            <label class="form-label required" for="question">{{
              '::Minigame:Question' | abpLocalization
            }}</label>
            <textarea
              type="text"
              id="question"
              class="form-control"
              [(ngModel)]="questionModel.questionText"
              [placeholder]="'::Minigame:Question' | abpLocalization"
            ></textarea>
          </div>
        </div>

        <div class="row mb-2">
          <label class="form-label required" for="input">{{
            '::Minigame:Input' | abpLocalization
          }}</label>
          @for (answer of questionModel.answers; track i; let i = $index) {
            <div class="d-flex justify-content-between mb-1">
              <div class="input-group">
                <div class="input-group-text">
                  <input class="form-check-input mt-0" type="checkbox" [(ngModel)]="answer.isCorrect" aria-label="Checkbox for following text input">
                </div>
                <input
                  id="input"
                  type="text"
                  [placeholder]="'::Minigame:Input' | abpLocalization"
                  [(ngModel)]="answer.answerText"
                  class="form-control"
                />
              </div>
              <button
                class="btn btn-link text-danger p-0 ms-2"
                [disabled]="i === 0"
                (click)="deleteAnswer(i)"
              >
                <span>
                  <i class="bi bi-trash"></i>
                </span>
              </button>
            </div>
          }
        </div>
        <div class="row mb-2">
          <button
            class="btn btn-link text-start link-underline-opacity-0"
            (click)="addAnswer()"
            style="color: #f61d85"
          >
            {{ '::Minigame:CreateMoreAnswer' | abpLocalization }}
          </button>
        </div>
      </div>
      <div class="col-4">
        <div class="row mb-2">
          <label class="form-label required">
            {{ '::Minigame:DataType' | abpLocalization }}
          </label>
          <ngx-bootstrap-multiselect
            class="w-100 d-block"
            [options]="QuestionDataType"
            [settings]="singleSelectSettings"
            [texts]="MultiText"
            [(ngModel)]="questionModel.dataType"
            id="product-name"
          ></ngx-bootstrap-multiselect>
        </div>
      </div>
    </div>
  </div>
  <div class="card-footer border-top pt-3">
    <div class="d-flex justify-content-between">
      <div class="">
        <div class="form-check">
          <input
            type="checkbox"
            class="form-check-input"
            [(ngModel)]="questionModel.isObligatory"
          />
          <label class="form-check-label mb-2"> {{ '::Minigame:Obligatory' | abpLocalization }} </label
          ><span class="style-span">*</span>
        </div>
      </div>
      <div>
        <div class="d-flex justify-content-between">
          <button class="btn btn-link text-info p-0 ms-2" (click)="addQuestion()">
            <span>
              <i class="bi bi-plus-circle"></i>
            </span>
          </button>
          <button class="btn btn-link text-info p-0 ms-2" (click)="duplicateQuestion()">
            <span>
              <i class="bi bi-copy"></i>
            </span>
          </button>
          <button
            class="btn btn-link text-info p-0 ms-2"
            (click)="deleteQuestion()"
            [disabled]="questionIndex === 0"
          >
            <span>
              <i class="bi bi-trash"></i>
            </span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
